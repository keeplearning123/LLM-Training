version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-local-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
      - ./entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped

volumes:
  ollama_storage: